name: Feature Request
description: Suggest a new sample or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the sample or feature you would like to see.
      placeholder: Describe the feature or improvement...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this sample important? What scenario does it demonstrate?
      placeholder: |
        Currently there is no example of...
        This would help developers who need to...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative approaches you have considered.
    validations:
      required: false
