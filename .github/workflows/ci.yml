name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: 8.0.x

    - name: Download SDK package from GitHub Release
      run: |
        mkdir -p .nupkgs
        curl -sL "https://github.com/Azure/Connectors-NET-SDK/releases/download/v0.1.0-preview.1/Microsoft.Azure.Connectors.Sdk.0.1.0-preview.1.nupkg" \
          -o .nupkgs/Microsoft.Azure.Connectors.Sdk.0.1.0-preview.1.nupkg
        dotnet nuget add source "$(pwd)/.nupkgs" --name local-sdk

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release
